# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []
# Critical or High severity advisories fail the build.
# Medium and Low are warnings (visible but not blocking).
severity-threshold = "high"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "0BSD",
    "Unicode-2.0",
    "BSL-1.0",
]
confidence-threshold = 0.8

# The Spiral project itself is MPL-2.0; we do not allow GPL/LGPL/AGPL deps.
# If a dep genuinely requires one, document it in an ADR.

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
