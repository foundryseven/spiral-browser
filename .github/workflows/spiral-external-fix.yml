# @spiral-fixer — automated PR fixer (fork PRs, opt-in)
#
# Runs when a maintainer or contributor comments '@spiral-fixer Fix my code' on a fork PR.
# Safely checks out the fork branch (via pull_request_target context secrets), runs the
# fixer bot, and pushes the fix commits back to the contributor's fork branch.

name: spiral-external-fix

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write
  checks: write
  actions: read

jobs:
  fix-external:
    # Trigger ONLY if comment is on a PR and matches the opt-in phrase exactly
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.body == '@spiral-fixer Fix my code'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Get PR Info
        id: pr_info
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          # Fetch PR head repo name, owner, and ref using gh CLI
          PR_DATA=$(gh pr view "$PR_NUMBER" --json headRepository,headRepositoryOwner,headRef)
          
          OWNER=$(echo "$PR_DATA" | jq -r '.headRepositoryOwner.login')
          REPO=$(echo "$PR_DATA" | jq -r '.headRepository.name')
          REF=$(echo "$PR_DATA" | jq -r '.headRef')
          
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Fork Branch
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr_info.outputs.owner }}/${{ steps.pr_info.outputs.repo }}
          ref: ${{ steps.pr_info.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }} # pull_request_target/issue_comment token has write access to fork branches by default if maintainer edits are enabled.

      - name: Set up Rust toolchain
        uses: actions/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run fixer agent
        id: fixer
        uses: anomalyco/opencode/github@<PINNED_SHA>
        with:
          model: opencode-go/mimo-v2.5-pro # Fork fixes default to Pro for highest correctness on external code
          agent: ./.opencode/agents/spiral-fixer.md
          prompt: ./.opencode/prompts/fix.md
          api_key: ${{ secrets.OPENCODE_API_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
