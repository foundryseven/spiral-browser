name: Task
description: A self-contained unit of work that is neither a bug nor a feature.
labels: ["task", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for refactors, infrastructure work, or documentation tasks.

  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which crates, docs, or CI files are in scope?
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
