name: Bug Report
description: Report a defect in Spiral Browser.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in the sections below.
        If the bug is a security vulnerability, do not file it here —
        follow the disclosure process in `SECURITY.md` instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal HTML, CSS, JS, URL, or command sequence that triggers the bug.
      placeholder: |
        1. cargo build --workspace
        2. cargo run -p spiral-browser -- --url file:///tmp/repro.html
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit Hash or Tag
      description: The exact commit or tag you tested against.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: false
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: e.g. Ubuntu 24.04, macOS 15.3, Windows 11 23H2.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output of `RUST_LOG=debug cargo run ...` or relevant crash traces.
      render: shell
